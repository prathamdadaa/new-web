<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Microsoft-Inspired Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Microsoft-Inspired Dynamic Background Layer -->
    <div class="bg-blur-container" aria-hidden="true">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <!-- Main Content Wrapper -->
    <div class="content-wrapper">
        
        <!-- Intro Section -->
        <header class="intro-section">
            <div class="logo" id="logoContainer">
                <!-- Iconic 4-square Microsoft layout using secure CSS grids -->
                <div class="square red"></div>
                <div class="square green"></div>
                <div class="square blue"></div>
                <div class="square yellow"></div>
            </div>
            <h1 class="fade-in">Meet the New Era of Innovation</h1>
            <p class="fade-in-delayed">Experience seamless productivity, advanced security, and elegant design built completely around your workflow.</p>
            <button class="ms-btn" id="ctaButton">Get Started</button>
        </header>

        <!-- Outro / Footer Section -->
        <footer class="outro-section">
            <div class="footer-links">
                <a href="#">Privacy & Cookies</a>
                <a href="#">Terms of Use</a>
                <a href="#">Trademarks</a>
                <a href="#">About our Ads</a>
            </div>
            <p class="copyright">&copy; <span id="currentYear"></span> Microsoft-Inspired Portal. All rights secured.</p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
